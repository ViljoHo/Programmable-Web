syntax = "proto3";

package ranking;

message Report {
  int64 id = 1;
  string timestamp = 2;
  int64 upvote_count = 3;
  int64 comment_count = 4;
}

message RankingRequest {
  repeated Report reports = 1;
}

message Ranking {
  int64 report_id = 1;
  float score = 2;
}

message RankingResponse {
  bool success = 1;
  string message = 2;
  repeated Ranking rankings = 3;
}

service RankingService {
  rpc CalculateRanking (RankingRequest) returns (RankingResponse);
}
