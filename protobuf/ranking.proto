syntax = "proto3";

package ranking;

message Report {
  int64 id = 1;
  string timestamp = 2;
  int64 upvote_count = 3;
  int64 comment_count = 4;
}

message RankingRequest {
  string task_id = 1;
  repeated Report reports = 2;
}

message RankingResponse {
  string task_id = 1;
  bool success = 2;
  string message = 3;
}

message Ranking {
  int64 report_id = 1;
  float urgency_score = 2;
}

message RankUpdateRequest {
  string task_id = 1;
  repeated Ranking rankings = 2;
}

message RankUpdateResponse {
  bool success = 1;
}

service RankingService {
  rpc RunPeriodicRanking (RankingRequest) returns (RankingResponse);
}

service MainApiService {
  rpc UpdateUrgencyScores (RankUpdateRequest) returns (RankUpdateResponse);
}
