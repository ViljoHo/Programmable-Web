syntax = "proto3";

package ranking;

message ReportRequest {
  int32 batch_size = 1;
}

message IssueReport {
  int64 id = 1;
  int64 timestamp = 2;
  int64 upvote_count = 3;
  int64 comment_count = 4;
}

message ReportResponse {
  repeated IssueReport reports = 1;
}

message ScoreEntry {
  int64 report_id = 1;
  float urgency_score = 2;
}

message ScoreUpdateRequest {
  repeated ScoreEntry scores = 1;
}

message ScoreUpdateResponse {
  bool success = 1;
}

service MainApiService {
  rpc GetReportData (ReportRequest) returns (ReportResponse);
  rpc UpdateUrgencyScores (ScoreUpdateRequest) returns (ScoreUpdateResponse);
}
