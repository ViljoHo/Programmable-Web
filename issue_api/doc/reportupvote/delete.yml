---
parameters:
  - $ref: '#/components/parameters/report'
  - $ref: '#/components/parameters/user'
description: Remove an upvote from a specific report. The user ID in path must match the authenticated user.
security:
  - issueApiKey: []
responses:
  '204':
    description: Upvote removed successfully
  '401':
    description: Unauthorized, API key missing or invalid
  '403':
    description: Forbidden, API key user does not match the URL parameter user ID
  '404':
    description: Report, user, or upvote not found
