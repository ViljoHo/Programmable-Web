# This is just for getting the certificates
server {
    listen 80;
    server_name projects.issueapi.viljoholma.fi;

    # Required for Let's Encrypt certificate validation (ACME Challenge)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Default location to confirm Nginx is running
    location / {
        return 200 "Nginx is running in setup mode. Ready for Certbot.";
        add_header Content-Type text/plain;
    }
}
